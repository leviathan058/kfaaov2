<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For Michelle II</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <a href="index.html" class="back-btn">Back</a>
    <div id="wordflower-wrap">
      <p id="wf-score">Words found: <span id="wf-count">0</span>/10</p>
      <div id="flower-container" class="flower-container"></div>
      <div id="wf-input-row">
        <div id="wf-current"></div>
        <button onclick="submitWord()">Submit</button>
        <button onclick="shufflePetals()">Shuffle</button>
      </div>
      <div id="wf-found"></div>
      <p id="wf-message"></p>
      <div class="modal-overlay" id="modal-overlay">
        <div class="modal-popup">
          <p class="modal-msg">good job! 6. [49][1]</p>
          <button class="modal-close" onclick="document.getElementById('modal-overlay').classList.remove('active')">Close</button>
        </div>
      </div>
    </div>
  </main>
  <script src="js/wordflower.js"></script>
</body>
</html>
